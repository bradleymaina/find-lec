<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>find-lec | Find Your Lecturer</title>
    <meta name="description"
        content="A minimalistic, beautiful, and sleek Gruvbox-themed interface to search for lecturers and view their profiles.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,400&family=Space+Grotesk:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Subtle Retro Grid Background -->
    <div class="grid-background"></div>

    <!-- Main Container -->
    <main class="search-container">
        <!-- Brand / Header Section -->
        <header class="search-header">
            <div class="logo-area">
                <span class="logo-icon">(⌐■_■)</span>
                <h1 class="logo-text">find-<span class="highlight">lec</span></h1>
            </div>
            <p class="tagline">Find Lecturers phone numbers </p>
        </header>

        <!-- Search Form Section -->
        <form class="search-form" id="searchForm" onsubmit="event.preventDefault();">
            <div class="input-wrapper">
                <div class="input-emicon-hint">(•_•) 🔍</div>
                <input type="text" id="lecturerSearch" name="lecturerName" placeholder="Enter Lecturer Name (•_•) 🔍"
                    autocomplete="off" required>
                <div class="input-focus-border"></div>
            </div>

            <button type="button" id="searchButton" class="btn-search">
                <span class="btn-text">Search</span>
                <span class="btn-icon">⚡</span>
            </button>
        </form>

        <!-- Dynamic Emoticon Card / Status Indicator -->
        <div class="status-indicator">
            <span class="status-emoticon" id="statusEmoticon">┐(‘～` )┌</span>
            <span class="status-text" id="statusText">Ready to seek knowledge...</span>
        </div>

        <!-- Search Results Container -->
        <div id="resultsContainer" class="results-container"></div>

        <!-- Footer -->
        <footer class="search-footer">
            <p>ushirika</p>
        </footer>
    </main>

    <!-- Script -->
    <script src="index.js"></script>
</body>

</html>
